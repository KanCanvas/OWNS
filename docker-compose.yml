version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: ownpizza-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ownpizza
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ownpizza_pg_data:/var/lib/postgresql/data

volumes:
  ownpizza_pg_data:
